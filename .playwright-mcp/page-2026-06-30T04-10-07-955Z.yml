                - paragraph [ref=e213]:
                  - text: Hey Product Hunt,
                  - text: "We are bacccck again! This time I'd like to introduce our latest product: Invoko."
                  - text: "When dealing with everyday tasks, we'd always feel overwhelmed with a lot of distractions: multiple agent sessions running at the same time, messages from slack popping up all day, colleges asking for quick calls out of nowhere, isn't it nice to have someone or something to handle these and sort them out for you?"
                  - text: That's the reason we build Invoko.
                  - text: Invoko is a desktop agent lives on your mac that you can talk to while working. By simply pressing a shortcut (Fn), you can dispatch all the tasks that you don't want to handle to it. No matter it's sorting your emails and extract todo lists, or scheduling calendar to avoid those annoying quick calls, or simply replying to messages that you don't want to engage, Invoko got your back.
                  - text: It's fully local deployed on your mac, which means it can easily understand what you are doing right now and what's your intention. It can operate across all your apps with full functionalities and zero privacy concern.
                  - text: "We've put around 3 months to build Invoko and have iterated 71 times till this morning (based on the version # lol)"
                  - text: It's something that we use daily within our team and we genuinely think that it can benefit ppl with the same pain points and passion.
                  - text: "For trying it out, please head to:"
                  - button "https://invoko.ai/?utm_source=ph&utm_medium=referral&utm_campaign=june" [ref=e214] [cursor=pointer]
                  - text: (We use utm to track the incoming traffic more precisely FYI)
                  - text: If you find any issue or bug, please reach out to
                  - button "hey@invoko.ai" [ref=e215] [cursor=pointer]
                  - text: . We read & reply to every user email manually (100% hand written)
                  - text: Hope you like it and we can't wait to hear your thoughts!
